name: Dragon Ball TCG Monitor

on:
  schedule:
    # Every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write   # needed to commit data.json + state back

concurrency:
  group: tcg-monitor
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TCG_STATE_DIR: ${{ github.workspace }}/state
          TCG_DASHBOARD_FEED: ${{ github.workspace }}/data.json
        run: python monitor.py

      - name: Commit state + dashboard data
        run: |
          git config user.name "tcg-monitor-bot"
          git config user.email "tcg-monitor@users.noreply.github.com"
          git add state/ data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update TCG monitor data ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
