name: Dragon Ball TCG Monitor

on:
  schedule:
    # Every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write   # needed to commit data.json + state back

concurrency:
  group: tcg-monitor
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TCG_STATE_DIR: ${{ github.workspace }}/state
          TCG_DASHBOARD_FEED: ${{ github.workspace }}/data.json
        run: python monitor.py

      - name: Notify Telegram on workflow failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="<b>Monitor self-heal: workflow FAILED</b>%0A%0ARun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}%0A%0AInvestigate logs."
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "text=$MSG" >/dev/null

      - name: Commit state + dashboard data
        continue-on-error: true
        run: |
          git config user.name "tcg-monitor-bot"
          git config user.email "tcg-monitor@users.noreply.github.com"
          git add state/ data.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git stash --include-untracked || true
          git pull --rebase origin main || true
          git stash pop || true
          git add state/ data.json 2>/dev/null || true
          git commit -m "Update TCG monitor data ($(date -u +%Y-%m-%dT%H:%MZ))" || exit 0
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying..."
            git pull --rebase origin main || true
            sleep $((i * 2))
          done
          echo "WARN: push failed after 5 retries, will retry next run"
          exit 0
