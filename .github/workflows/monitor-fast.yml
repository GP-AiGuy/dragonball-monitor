name: Dragon Ball TCG Monitor (Fast)

# Fast polling of priority URLs only (BT31 + FB10 direct product pages).
# Runs every 30 minutes (stays within GH Actions free tier).
# Skips slow shop searches + news.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tcg-monitor-fast
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run priority-only check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TCG_STATE_DIR: ${{ github.workspace }}/state
          TCG_DASHBOARD_FEED: ${{ github.workspace }}/data.json
        run: python monitor.py --priority-only

      - name: Notify Telegram on workflow failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="<b>Fast monitor FAILED</b>%0ARun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "text=$MSG" >/dev/null

      - name: Commit state + dashboard data
        continue-on-error: true
        run: |
          set +e
          git config user.name "tcg-monitor-bot"
          git config user.email "tcg-monitor@users.noreply.github.com"
          # Generated files - always overwrite remote, never merge.
          mkdir -p /tmp/scraped
          [ -d state ] && cp -r state /tmp/scraped/
          [ -f data.json ] && cp data.json /tmp/scraped/
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            [ -d /tmp/scraped/state ] && cp -r /tmp/scraped/state .
            [ -f /tmp/scraped/data.json ] && cp /tmp/scraped/data.json .
            git add state data.json 2>/dev/null
            if git diff --staged --quiet; then
              echo "No changes"
              exit 0
            fi
            git commit -m "Fast: priority URL update ($(date -u +%H:%MZ))"
            if git push; then
              exit 0
            fi
            sleep $((i * 2))
          done
          echo "WARN: push failed after 5 retries"
          exit 0
